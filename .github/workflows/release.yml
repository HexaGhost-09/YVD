name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Project Version
        id: get_version
        run: |
          # Read version from pubspec.yaml and strip build number (the part after +)
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          TAG="v$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Building version: $TAG"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build Windows
        if: false # Set to true to include windows build, but user specifically asked for APK.
        run: flutter build windows --release

      - name: Create Release and Upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: ${{ steps.get_version.outputs.TAG }}
          name: "Release ${{ steps.get_version.outputs.TAG }}"
          body: "Automated build of YVD version ${{ steps.get_version.outputs.TAG }}"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
