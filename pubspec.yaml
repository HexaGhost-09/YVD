name: yvd
description: "YVD - Premium Video Downloader and Manager."
publish_to: 'none'

version: 1.2.3+23

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  flutter_animate: ^4.5.2
  lucide_icons: ^0.257.0
  glassmorphism_ui: ^0.3.0
  shimmer: ^3.0.0
  loading_animation_widget: ^1.3.0
  youtube_explode_dart: ^2.2.2
  dio: ^5.4.1
  gal: ^2.3.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  shared_preferences: ^2.2.2
  archive: ^4.0.9
  file_picker: ^8.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
